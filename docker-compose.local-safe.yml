services:
  postgres:
    image: postgres:16-alpine
    container_name: carreirahub-local-safe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carreirahub_local_safe
    ports:
      - "55432:5432"
    volumes:
      - carreirahub_local_safe_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carreirahub_local_safe"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: carreirahub-local-safe-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - carreirahub_local_safe_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  carreirahub_local_safe_postgres:
  carreirahub_local_safe_redis:
