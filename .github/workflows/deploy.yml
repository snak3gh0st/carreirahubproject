name: Deploy CarreiraHub

run-name: "Deploy CarreiraHub (${{ github.ref_name }} @ ${{ github.sha }})"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: carreirahub-production
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  APP_URL: https://app.carreirausa.com
  IMAGE: ghcr.io/snak3gh0st/carreirahubproject
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
      url: https://app.carreirausa.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and push image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::8}"

          echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          docker build --pull --platform linux/amd64 -t "$IMAGE:$short_sha" -t "$IMAGE:latest" .
          docker push "$IMAGE:$short_sha"
          docker push "$IMAGE:latest"

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on Swarm
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::8}"

          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set -euo pipefail
            echo '$GHCR_PULL_TOKEN' | docker login '$REGISTRY' -u 'snak3gh0st' --password-stdin
            docker pull '$IMAGE:$short_sha'
            docker service update --with-registry-auth --image '$IMAGE:$short_sha' carreirahub_hub || docker stack deploy --with-registry-auth -c /opt/carreirahub/hub-stack.yml carreirahub
          "

      - name: Verify runtime
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::8}"
          service_image="$(ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker service inspect carreirahub_hub --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}'")"
          running_image="$(ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker service ps carreirahub_hub --filter desired-state=running --no-trunc --format '{{.Image}}' | head -n 1")"

          printf 'SERVICE_IMAGE=%s\n' "$service_image"
          printf 'RUNNING_IMAGE=%s\n' "$running_image"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "docker service ps carreirahub_hub --no-trunc --format 'table {{.ID}}\t{{.Name}}\t{{.CurrentState}}\t{{.Error}}\t{{.Image}}'"

          [[ "$service_image" == *":$short_sha"* ]]
          [[ "$running_image" == *":$short_sha"* ]]

          curl --retry 10 --retry-delay 3 --retry-all-errors -fsS "$APP_URL/api/health"
          curl --retry 10 --retry-delay 3 --retry-all-errors -IfsS "$APP_URL/ops/login"
          curl --retry 10 --retry-delay 3 --retry-all-errors -IfsS "$APP_URL/hub/login"
