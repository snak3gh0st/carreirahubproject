stages:
  - build
  - deploy

variables:
  IMAGE: registry.gitlab.com/sigma-group192807/carreirausahub
  DOCKER_DRIVER: overlay2

# ── Build & push image ────────────────────────────────────────────────────────
build:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --pull -t "$IMAGE:$CI_COMMIT_SHORT_SHA" -t "$IMAGE:latest" .
    - docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Deploy to carreirausa Swarm ───────────────────────────────────────────────
# Requires CI/CD variable SSH_PRIVATE_KEY set in GitLab project settings.
deploy:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - chmod 400 "$SSH_PRIVATE_KEY" && ssh-add "$SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" \
        "docker service update --image $IMAGE:$CI_COMMIT_SHORT_SHA carreirahub_hub \
         || docker stack deploy -c /opt/carreirahub/hub-stack.yml carreirahub"
  environment:
    name: production
    url: https://app.carreirausa.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Required CI/CD variables (set in GitLab → Settings → CI/CD → Variables) ──
# CI_REGISTRY_USER     — auto-set by GitLab
# CI_REGISTRY_PASSWORD — auto-set by GitLab
# CI_REGISTRY          — auto-set by GitLab
# SSH_PRIVATE_KEY      — private key for carreirausa SSH access
# DEPLOY_HOST          — carreirausa hostname or IP
# DEPLOY_USER          — SSH user (e.g. deploy or ubuntu)
